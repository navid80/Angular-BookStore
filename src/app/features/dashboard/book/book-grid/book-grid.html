<div class="w-11/12 rounded-xl border border-gray-200 bg-white m-auto mt-4 pt-4 pb-3 overflow-x-auto my-5">
    <div class="w-full flex justify-between items-center gap-4">
        <div class="font-secondery space-y-1 p-4 pr-8">
            <h3 class="text-xl font-semibold">کتاب‌ها</h3>
            <h5>لیست کتاب های تعریف شده</h5>
        </div>
        <div class="flex gap-4 px-8 font-secondery">
            <button class="p-2.5 bg-brand text-white font-semibold rounded-md hover:cursor-pointer hover:bg-gray-200 hover:text-gray-500 hover:ring hover:ring-gray-300 shadow-sm">
                <span>ایجاد</span>
            </button>
            <button class="p-2.5 bg-brand text-white font-semibold rounded-md hover:cursor-pointer hover:bg-gray-200 hover:text-gray-500 hover:ring hover:ring-gray-300 shadow-sm">
                <span>خروجی اکسل</span>
            </button>
            <div class="w-75 flex shadow-sm items-center border border-gray-300 rounded-lg focus-within:ring-3 focus-within:ring-blue-500/10 focus-within:border-blue-300">
                <input type="text" placeholder="جستجو..."
                    class="h-11 w-full focus:outline-none py-2.5 pr-4 pl-11 text-sm text-gray-800 placeholder:text-gray-400 bg-transparent">
                <i class="fa-regular fa-magnifying-glass text-gray-500 py-2 pl-4"></i>
            </div>
            <div>
                <button
                    (click)="isFilterOpen.update(status => !status)"
                    #filterBtn
                    cdkOverlayOrigin
                    #filter="cdkOverlayOrigin"
                    class="p-2.5 flex items-center justify-center hover:bg-gray-200 rounded-md cursor-pointer ring ring-gray-300 shadow-sm">
                    <i class="fa-regular fa-filter text-2xl text-gray-500"></i>
                </button>
                <ng-template
                    cdkConnectedOverlay
                    [cdkConnectedOverlayOrigin]="filter"
                    [cdkConnectedOverlayOpen]="isFilterOpen()"
                    cdkConnectedOverlayUsePopover="inline"
                    [cdkConnectedOverlayPositions]="[
                        {originX: 'end', originY: 'bottom', overlayX: 'end', overlayY: 'top', offsetY: 10}
                    ]"
                >
                    <div #filterContainer class="bg-white shadow-sm flex flex-col gap-4 px-4 py-6 rounded-md ring ring-gray-300 font-secondery">
                        <label class="flex flex-col gap-1">
                            دسته بندی
                            <input type="text" placeholder="جستجوی دسته بندی" 
                                class="outline-none border border-gray-300 rounded-lg text-sm text-gray-800 placeholder:text-gray-400 bg-transparent
                                    py-2.5 pr-4 pl-11 focus:ring-3 focus:ring-blue-500/10 focus:border-blue-300">
                        </label>
                        <label class="flex flex-col gap-1">
                            نویسنده
                            <input type="text" placeholder="جستجوی نویسنده" 
                                class="outline-none border border-gray-300 rounded-lg text-sm text-gray-800 placeholder:text-gray-400 bg-transparent
                                    py-2.5 pr-4 pl-11 focus:ring-3 focus:ring-blue-500/10 focus:border-blue-300">
                        </label>
                        <label class="flex flex-col gap-1">
                            تاریخ
                            <input type="text" placeholder="جستجوی تاریخ" 
                                class="outline-none border border-gray-300 rounded-lg text-sm text-gray-800 placeholder:text-gray-400 bg-transparent
                                    py-2.5 pr-4 pl-11 focus:ring-3 focus:ring-blue-500/10 focus:border-blue-300">
                        </label>
                        <button class="rounded-md cursor-pointer ring ring-gray-300 shadow-sm w-25 h-8 m-auto hover:bg-brand hover:text-white hover:ring-0">اعمال</button>
                    </div>
                </ng-template>
            </div>
        </div>
    </div>
    <div class="w-full overflow-x-auto">
        <table ngGrid class="w-full">
            <thead class="border-gray-200 border-y-2">
                <tr ngGridRow class="font-main font-semibold text-right text-lg">
                    <th ngGridCell class="py-4 px-4 text-gray-500">ردیف</th>
                    <th ngGridCell class="py-4 px-1 text-gray-500">عنوان</th>
                    <th ngGridCell class="py-4 px-1 text-gray-500">دسته بندی</th>
                    <th ngGridCell class="py-4 px-1 text-gray-500">نویسنده</th>
                    <th ngGridCell class="py-4 px-1 text-gray-500">تاریخ انتشار</th>
                    <th ngGridCell class="py-4 px-1 text-gray-500">عملیات</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-300">
                @for(book of books(); track book.id) {
                    <tr ngGridRow class="font-secondery text-gray-700">
                        <td ngGridCell class="py-4 px-4">{{ book.id }}</td>
                        <td ngGridCell class="py-4 px-1">{{ book.title }}</td>
                        <td ngGridCell class="py-4 px-1">{{ book.category }}</td>
                        <td ngGridCell class="py-4 px-1">{{ book.author }}</td>
                        <td ngGridCell class="py-4 px-1">{{ book.publishDate }}</td>
                        <td ngGridCell class="py-4 px-1">
                            <span class="flex gap-4 text-lg">
                                <button class="cursor-pointer p-1">
                                    <i class="fa-regular fa-pen"></i>
                                </button>
                                <button class="cursor-pointer p-1">
                                    <i class="fa-regular fa-trash"></i>
                                </button>
                            </span>
                        </td>
                    </tr>
                }
            </tbody>
        </table>
    </div>
    <div class="w-full flex items-center justify-between border-t border-gray-200 pt-6 p-4">
        <div class="flex gap-4 items-center">
            <button class="p-2 size-10 border border-gray-200 rounded-md text-gray-400 hover:bg-gray-50 hover:cursor-pointer shadow-sm">
                <i class="fa-regular fa-arrow-right"></i>
            </button>
            <div class="flex gap-2">
                <span class="p-2 text-center size-10 hover:cursor-pointer rounded-md bg-brand text-white">1</span>
                <span class="p-2 text-center size-10 hover:cursor-pointer rounded-md hover:bg-brand hover:text-white">2</span>
                <span class="p-2 text-center size-10 hover:cursor-pointer rounded-md hover:bg-brand hover:text-white">3</span>
            </div>
            <button class="p-2 size-10 border border-gray-200 rounded-md text-gray-400 hover:bg-gray-50 hover:cursor-pointer shadow-sm">
                <i class="fa-regular fa-arrow-left"></i>
            </button>
        </div>
        <div class="font-secondery ml-10 p-2">
            آیتم <span>1</span> تا <span>10</span> از <span>25</span> آیتم
        </div>
    </div>
</div>
